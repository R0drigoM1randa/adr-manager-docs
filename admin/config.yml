backend:
  name: github
  repo: R0drigoM1randa/adr-manager-docs # <-- REEMPLAZA CON TU REPO REAL (ej: ecom-team/adr-docs)
  branch: main
  
  # Esta URL utiliza un servidor OAuth público y gratuito para validar los inicios de sesión de tu equipo con GitHub
  base_url: https://vercel.app
  auth_endpoint: /api/v1/authorize

media_folder: "docs/adr/images"
public_folder: "/docs/adr/images"

collections:
  - name: "adrs"
    label: "Registros de Decisiones (ADRs)"
    label_singular: "ADR"
    folder: "docs/adr" # Directorio raíz en Git
    create: true
    editor:
      preview: false

    # 1. ORGANIZACIÓN JERÁRQUICA (Menú Izquierdo: Colección -> Proyectos -> Archivos)
    nested:
      depth: 5 # Permite hasta 5 subniveles de carpetas para subproyectos si lo desean
      summary: "{{id}} - {{title}}" # Cómo se verá el archivo en el árbol visual
    
    # Campo Meta obligatorio para que Decap CMS pueda crear y mover carpetas físicamente en Git
    meta: { path: { widget: string, label: 'Ruta de Almacenamiento', index_file: 'index' } }

    # 2. BOTONES DE FILTRADO RÁPIDO EN LA INTERFAZ WEB
    view_filters:
      - label: "Solo Arquitectura Cloud"
        field: "role"
        pattern: "cloud"
      - label: "Solo Arquitectura de Datos"
        field: "role"
        pattern: "data"
      - label: "Solo Arquitectura de Soluciones"
        field: "role"
        pattern: "solutions"
      - label: "Decisiones Aceptadas"
        field: "status"
        pattern: "Aceptado"

    # 3. OPCIONES DE AGRUPACIÓN VISUAL DE LA LISTA
    view_groups:
      - label: "Agrupar por Rol de Arquitectura"
        field: "role"
      - label: "Agrupar por Estado de Gobernanza"
        field: "status"

    # 4. FORMULARIO ESTRUCTURADO PARA EL ARQUITECTO
    fields:
      - { label: "ID del ADR", name: "id", widget: "string", hint: "Ejemplo: 0001, 0002", required: true }
      - { label: "Título", name: "title", widget: "string", required: true }
      
      # Selección del Rol Responsable
      - label: "Rol del Autor"
        name: "role"
        widget: "select"
        options:
          - { label: "Arquitecto Cloud", value: "cloud" }
          - { label: "Arquitecto de Soluciones", value: "solutions" }
          - { label: "Arquitecto de Datos", value: "data" }
          - { label: "Arquitecto de Seguridad", value: "security" }
          - { label: "Arquitecto Empresarial", value: "enterprise" }
        required: true
        hint: "Rol principal responsable de liderar la decisión."

      - { label: "Fecha", name: "date", widget: "datetime", format: "YYYY-MM-DD", required: true }
      
      # Estados de Gobernanza
      - label: "Estado de la Decisión"
        name: "status"
        widget: "select"
        options: ["Propuesto", "Aceptado", "Rechazado", "Supercedido"]
        required: true

      # Secciones del documento ADR (Editor Visual de Texto)
      - { label: "Contexto", name: "context", widget: "markdown", hint: "¿Cuál es el problema técnico o de negocio que enfrentamos?", required: false }
      - { label: "Decisión", name: "decision", widget: "markdown", hint: "La alternativa elegida y por qué.", required: false }
      - { label: "Consecuencias", name: "consequences", widget: "markdown", hint: "Pros, contras y riesgos de esta decisión.", required: false }
